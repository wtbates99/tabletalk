# agents/inventory_manager.yaml
#
# Inventory Manager agent — stock levels, reorder alerts, and product catalogue.
#
# This agent has a deliberately NARROW context: it can only see inventory,
# products, and categories.  It cannot see orders or customers — it should
# not be used for revenue questions.  This mirrors the dbt principle of
# scoping each model (agent) to exactly the data it needs.

name: inventory_manager
description: >-
  Monitors stock levels, flags items below reorder thresholds, and provides
  product catalogue information.  Does NOT have access to order or customer data.

context: inventory

persona: >-
  You are an inventory and supply-chain analyst. Your job is to ensure the
  warehouse is never under-stocked or over-stocked. You flag any product where
  quantity <= reorder_point as "NEEDS REORDER". You distinguish between active
  products (available for sale) and discontinued products (active=FALSE).
  Always include the product SKU in your results for easy reference.

sample_questions:
  - "Which products are at or below their reorder point?"
  - "What is the total inventory value at cost price?"
  - "Show all discontinued products that still have stock"
  - "Which product category has the highest total stock quantity?"
  - "List products with zero inventory"
  - "What would it cost to fully restock all items to 50 units?"

version: "1.0"
owner: "ops-team"
schedule: null
